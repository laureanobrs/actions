name: Update package json

on:
  workflow_dispatch:

jobs:
  update-package-json:
    name: Update package json
    runs-on: ubuntu-24.04
    steps:
    - name: Check out revision
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
          
    - name: Update
      run: |
        cat > setup-linters/package.json <<'EOF'
        {
          "name": "setup-linters",
          "version": "2.5.0",
          "description": "Javascript GitHub Action to set up linters.",
          "main": "index.js",
          "scripts": {
            "test": "echo \"Error: no test specified\" && exit 1"
          },
          "author": "",
          "license": "Apache-2.0",
          "dependencies": {
            "@actions/core": "^3.0.1",
            "@actions/io": "^1.1.3",
            "@actions/tool-cache": "^4.0.0"
          }
        }
        EOF

    - name: Regenerate package-lock.json
      working-directory: setup-linters
      run: |
        npm install

    - name: Show regenerated package-lock.json
      run: |
        cat setup-linters/package-lock.json

    - name: Upload regenerated lockfile
      uses: actions/upload-artifact@v4
      with:
        name: setup-linters-package-lock
        path: setup-linters/package-lock.json
      
